<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Comprar | Altorra Inmobiliaria</title>
<meta name="description" content="Compra de propiedades en Altorra: apartamentos, casas, lotes y oficinas."/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet"/>

<style>
  :root{
    --gold:#d4af37;
    --accent:#ffb400;
    --bg:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --header-h:72px;
    --gap:14px;
    --page-max:1200px;
    --overlay:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,-apple-system,"Segoe UI",Roboto,Arial;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  @media (prefers-reduced-motion:reduce){
    *{scroll-behavior:auto !important;animation:none !important;transition:none !important}
  }

  /* ---------- HEADER (espacio y utilidades; el look lo trae header.html) ---------- */
  .container{max-width:var(--page-max);margin:0 auto;width:100%;padding:0 16px}
  main{padding-top:calc(var(--header-h) + 12px)}

  /* ---------- SUB-HERO ---------- */
  .subhero{background:linear-gradient(180deg,#fff,#fbfbfb);border-bottom:1px solid rgba(0,0,0,.06)}
  .subhero .wrap{max-width:var(--page-max);margin:0 auto;padding:20px 16px}
  .crumbs{color:var(--muted);font-size:.92rem}
  .crumbs a{color:#374151}
  .subhero h1{margin:6px 0 0;font-size:clamp(1.6rem,3.4vw,2.2rem);font-weight:800;letter-spacing:-.3px}

  /* ---------- FILTROS ---------- */
  .filters{max-width:var(--page-max);margin:14px auto;padding:0 16px}
  .filters form{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end}
  .filters label{font-size:.86rem;color:var(--muted)}
  .filters input,.filters select{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--text)
  }
  .filters .actions{display:flex;gap:8px}
  .btn{padding:11px 14px;border-radius:10px;border:0;font-weight:800;cursor:pointer}
  .btn-primary{background:linear-gradient(90deg,var(--accent),#ffd95e);color:#111;box-shadow:0 10px 26px rgba(0,0,0,.12)}
  .btn-secondary{background:#f3f4f6}
  @media (max-width:1024px){ .filters form{grid-template-columns:repeat(3,1fr)} }
  @media (max-width:640px){ .filters form{grid-template-columns:1fr} .filters .actions{justify-content:stretch} .btn{width:100%} }

  /* ---------- LISTA ---------- */
  .list-head{max-width:var(--page-max);margin:6px auto 0;padding:0 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}
  .list-head .count{color:var(--muted)}
  .grid{max-width:var(--page-max);margin:10px auto 22px;padding:0 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media (max-width:1000px){ .grid{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:640px){ .grid{grid-template-columns:1fr} }

  .card{border-radius:12px;background:#fff;overflow:hidden;border:1px solid rgba(0,0,0,0.06);box-shadow:0 8px 24px rgba(0,0,0,0.06);display:flex;flex-direction:column}
  .card img{width:100%;height:190px;object-fit:cover}
  .card .body{padding:12px;display:flex;flex-direction:column;gap:4px}
  .price{font-weight:800;color:var(--gold)}
  .meta{color:var(--muted);font-size:.95rem}
  .tag{display:inline-block;background:#f5f5f5;border-radius:999px;padding:4px 8px;font-size:.8rem;margin-right:6px}
  .loadmore{display:flex;justify-content:center;margin:10px 0 28px}
  .empty{max-width:var(--page-max);margin:24px auto;padding:24px 16px;color:var(--muted)}

  /* ---------- FOOTER ---------- */
  footer{background:#0b0b0b;color:#fff}
</style>
</head>
<body>
<a href="#main" class="visually-hidden">Saltar al contenido principal</a>

<!-- HEADER (include) -->
<div id="header"></div>

<main id="main">
  <!-- Subhero -->
  <section class="subhero" aria-label="Encabezado de Comprar">
    <div class="wrap">
      <div class="crumbs"><a href="index.html">Inicio</a> · Comprar</div>
      <h1>Propiedades en <span style="color:var(--gold)">Venta</span></h1>
    </div>
  </section>

  <!-- Filtros -->
  <section class="filters" aria-label="Filtros de búsqueda">
    <form id="filtersForm">
      <div>
        <label for="f-city">Ciudad</label>
        <input id="f-city" name="city" placeholder="Ej. Cartagena"/>
      </div>
      <div>
        <label for="f-type">Tipo</label>
        <select id="f-type" name="type">
          <option value="">Todos</option>
          <option value="apartamento">Apartamento</option>
          <option value="casa">Casa</option>
          <option value="lote">Lote</option>
          <option value="oficina">Oficina</option>
        </select>
      </div>
      <div>
        <label for="f-min">Precio mín (COP)</label>
        <input id="f-min" name="min" inputmode="numeric" placeholder="0"/>
      </div>
      <div>
        <label for="f-max">Precio máx (COP)</label>
        <input id="f-max" name="max" inputmode="numeric" placeholder="2.000.000.000"/>
      </div>
      <div>
        <label for="f-beds">Habitaciones</label>
        <select id="f-beds" name="beds">
          <option value="">Cualquiera</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" type="button" id="btnClear">Limpiar</button>
        <button class="btn btn-primary" type="submit">Aplicar</button>
      </div>
    </form>
  </section>

  <!-- Cabecera de resultados -->
  <div class="list-head">
    <div class="count" id="resultCount">Mostrando 0 resultados</div>
    <div>
      <label for="sort" class="visually-hidden">Ordenar</label>
      <select id="sort" aria-label="Ordenar resultados">
        <option value="relevant">Relevancia</option>
        <option value="price_asc">Precio: menor a mayor</option>
        <option value="price_desc">Precio: mayor a menor</option>
        <option value="area_desc">Área: mayor a menor</option>
      </select>
    </div>
  </div>

  <!-- Grid -->
  <section class="grid" id="results" aria-live="polite"></section>
  <div class="loadmore"><button id="btnMore" class="btn btn-secondary" type="button" hidden>Cargar más</button></div>
  <div id="empty" class="empty" hidden>No encontramos propiedades con esos filtros. Intenta ajustar los valores.</div>
</main>

<!-- FOOTER (include) -->
<div id="footer"></div>

<script>
/* ======= Cargar header/footer y ejecutar sus <script> ======= */
async function include(id, url){
  const host = document.getElementById(id);
  if(!host) return;
  try{
    const res = await fetch(url, {cache:'no-cache'});
    const html = await res.text();
    host.innerHTML = html;

    // Ejecutar scripts embebidos (necesario para el menú)
    host.querySelectorAll('script').forEach(sOld=>{
      const sNew = document.createElement('script');
      if(sOld.src) sNew.src = sOld.src;
      sNew.type = sOld.type || 'text/javascript';
      sNew.defer = sOld.defer || false;
      sNew.async = sOld.async || false;
      sNew.textContent = sOld.textContent;
      sOld.replaceWith(sNew);
    });
  }catch(e){ console.warn('No se pudo incluir', url, e); }
}
include('header','header.html');
include('footer','footer.html');

/* ======= Datos de ejemplo (puedes reemplazar por tu backend) ======= */
const DATA = [
  {id:1,  title:'Apartamento moderno',   type:'apartamento', city:'Cartagena', price:1400000000, beds:2, baths:2, area:78,  img:'https://images.unsplash.com/photo-1501183638710-841dd1904471?q=80&w=1200'},
  {id:2,  title:'Casa familiar',        type:'casa',        city:'Barranquilla', price:720000000,  beds:4, baths:3, area:160, img:'https://images.unsplash.com/photo-1613977257593-00fcf54b38e3?q=80&w=1200'},
  {id:3,  title:'Lote inversión',       type:'lote',        city:'Turbaco', price:380000000,  beds:0, baths:0, area:420, img:'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200'},
  {id:4,  title:'Oficina premium',      type:'oficina',     city:'Cartagena', price:480000000,  beds:0, baths:1, area:58,  img:'https://images.unsplash.com/photo-1524758631624-e2822e304c36?q=80&w=1200'},
  {id:5,  title:'Penthouse vista',      type:'apartamento', city:'Cartagena', price:2480000000, beds:3, baths:3, area:210, img:'https://images.unsplash.com/photo-1521783593447-5702fcdac3b4?q=80&w=1200'},
  {id:6,  title:'Casa moderna',         type:'casa',        city:'Cartagena', price:1680000000, beds:4, baths:3, area:200, img:'https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1200'},
  {id:7,  title:'Apto cerca al mar',    type:'apartamento', city:'Cartagena', price:1160000000, beds:3, baths:2, area:95,  img:'https://images.unsplash.com/photo-1597047084897-51e81819a499?q=80&w=1200'},
  {id:8,  title:'Casa campestre',       type:'casa',        city:'Turbaco', price:2080000000, beds:5, baths:4, area:320, img:'https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1200'},
  {id:9,  title:'Oficina ejecutiva',    type:'oficina',     city:'Barranquilla', price:520000000,  beds:0, baths:1, area:64,  img:'https://images.unsplash.com/photo-1507209696998-3c532be9b2b1?q=80&w=1200'},
  {id:10, title:'Lote urbanizable',     type:'lote',        city:'Cartagena', price:460000000,  beds:0, baths:0, area:380, img:'https://images.unsplash.com/photo-152133470fdd6-537d81dc5e2e?q=80&w=1200'}
];

/* ======= Utilidades ======= */
const fmtCOP = v => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v);
const qs = () => Object.fromEntries(new URLSearchParams(location.search).entries());
const num = v => (v===''||v==null)? null : Number(String(v).replace(/[^\d]/g,'')||0);

/* ======= Estado ======= */
let PAGE = 1;
const PAGE_SIZE = 9;
let CURRENT = [];

/* ======= Render ======= */
function card(p){
  return `
  <article class="card">
    <img src="${p.img}" alt="${p.title}"/>
    <div class="body">
      <h3 style="margin:0">${p.title}</h3>
      <div class="meta">${p.beds||0}H · ${p.baths||0}B · ${p.area||0} m² · ${p.city}</div>
      <div class="price">${fmtCOP(p.price)}</div>
      <div style="margin-top:6px">
        <span class="tag">${p.type}</span>
        ${p.area? `<span class="tag">${p.area} m²</span>`:''}
      </div>
      <div style="margin-top:8px"><a class="btn btn-secondary" href="#">Ver detalles</a></div>
    </div>
  </article>`;
}

function applyFilters(){
  const form = document.getElementById('filtersForm');
  const f = new FormData(form);
  const city = (f.get('city')||'').toString().trim().toLowerCase();
  const type = (f.get('type')||'').toString();
  const min  = num(f.get('min'));
  const max  = num(f.get('max'));
  const beds = num(f.get('beds'));

  let res = DATA.filter(p=>{
    if(type && p.type!==type) return false;
    if(city && !p.city.toLowerCase().includes(city)) return false;
    if(min!=null && p.price < min) return false;
    if(max!=null && p.price > max) return false;
    if(beds!=null && (p.beds||0) < beds) return false;
    return true;
  });

  const sort = document.getElementById('sort').value;
  if(sort==='price_asc') res.sort((a,b)=>a.price-b.price);
  if(sort==='price_desc') res.sort((a,b)=>b.price-a.price);
  if(sort==='area_desc') res.sort((a,b)=>(b.area||0)-(a.area||0));

  CURRENT = res;
  PAGE = 1;
  render();
}

function render(){
  const root = document.getElementById('results');
  const count = document.getElementById('resultCount');
  const empty = document.getElementById('empty');
  const btnMore = document.getElementById('btnMore');

  const slice = CURRENT.slice(0, PAGE*PAGE_SIZE);
  count.textContent = `Mostrando ${slice.length} de ${CURRENT.length} resultados`;
  root.innerHTML = slice.map(card).join('');
  empty.hidden = CURRENT.length !== 0;
  btnMore.hidden = slice.length >= CURRENT.length;
}

/* ======= Eventos ======= */
document.getElementById('filtersForm').addEventListener('submit', e=>{
  e.preventDefault();
  applyFilters();
  // Actualiza la URL con city & q (opcional)
  const f = new FormData(e.currentTarget);
  const params = new URLSearchParams(location.search);
  const city = (f.get('city')||'').toString();
  const q = params.get('q') || ''; // reservada si llega del home
  const next = new URL(location.href);
  next.searchParams.set('city', city);
  if(q) next.searchParams.set('q', q);
  history.replaceState({},'',next);
});
document.getElementById('btnClear').addEventListener('click', ()=>{
  document.getElementById('filtersForm').reset();
  document.getElementById('sort').value='relevant';
  applyFilters();
});
document.getElementById('btnMore').addEventListener('click', ()=>{
  PAGE++; render();
});
document.getElementById('sort').addEventListener('change', applyFilters);

/* ======= Prefill desde querystring (del home) ======= */
(function init(){
  const p = qs();
  if(p.city) document.getElementById('f-city').value = p.city;
  if(p.q){ // si el usuario escribió palabra clave en el home, úsala como “ciudad o título”
    // Búsqueda básica en título o ciudad
    const q = p.q.trim().toLowerCase();
    const subset = DATA.filter(d => d.title.toLowerCase().includes(q) || d.city.toLowerCase().includes(q));
    if(subset.length) CURRENT = subset;
  }
  if(!CURRENT.length) CURRENT = DATA.slice();
  render();
})();
</script>
</body>
</html>
