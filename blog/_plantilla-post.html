<!--
  PLANTILLA: Artículo del Blog Inversionista
  ==========================================
  Cómo usar:
  1. Copiar este archivo a blog/{slug}.html
  2. Buscar y reemplazar TODOS los placeholders {{...}}:
     {{TITULO}}           — Título del artículo (55-60 chars, incluir año si aplica)
     {{RESUMEN}}          — Meta description (140-160 chars)
     {{SLUG}}             — URL slug (kebab-case, sin tildes)
     {{CATEGORIA}}        — Inversión | Rentabilidad | Legal & Fiscal | Análisis | Mercado | Guías
     {{FECHA_ISO}}        — 2026-05-02
     {{FECHA_VISIBLE}}    — 2 May 2026
     {{TIEMPO}}           — Ej: 8 (minutos)
     {{IMAGEN_OG}}        — URL imagen cover 1200x630
     {{CONTENIDO}}        — HTML del cuerpo (H2, H3, p, ul, table, blockquote)
  3. Añadir entrada a scripts/upload-blog-posts.mjs
  4. Añadir URL a sitemap.xml
  5. NO olvidar actualizar el JSON-LD con la fecha real
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="google" content="notranslate"/>
  <meta http-equiv="content-language" content="es"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{TITULO}} | Altorra Inmobiliaria</title>
  <meta name="description" content="{{RESUMEN}}"/>
  <link rel="canonical" href="https://altorrainmobiliaria.co/blog/{{SLUG}}.html"/>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#d4af37"/>
  <meta property="og:title" content="{{TITULO}}"/>
  <meta property="og:description" content="{{RESUMEN}}"/>
  <meta property="og:url" content="https://altorrainmobiliaria.co/blog/{{SLUG}}.html"/>
  <meta property="og:type" content="article"/>
  <meta property="og:image" content="{{IMAGEN_OG}}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .article-hero{background:linear-gradient(135deg,#0b0b0b,#1a1a2e);color:#fff;padding:clamp(48px,8vw,80px) 16px 48px;text-align:center}
    .article-hero .tag{display:inline-block;background:rgba(212,175,55,.2);color:var(--gold);font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
    .article-hero h1{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;margin:0;max-width:800px;margin:0 auto;line-height:1.25}
    .article-hero .meta{color:#9ca3af;margin-top:12px;font-size:.9rem}
    .article-body{max-width:760px;margin:0 auto;padding:40px 16px 60px;font-size:1.05rem;line-height:1.75;color:#1f2937}
    .article-body h2{font-size:1.4rem;font-weight:700;margin:32px 0 12px;color:#111827}
    .article-body h3{font-size:1.15rem;font-weight:700;margin:24px 0 8px;color:#111827}
    .article-body p{margin:0 0 16px}
    .article-body ul,.article-body ol{margin:0 0 16px;padding-left:24px}
    .article-body li{margin-bottom:6px}
    .article-body blockquote{border-left:4px solid var(--gold);padding:12px 18px;margin:20px 0;background:rgba(212,175,55,.08);color:#374151;font-style:italic;border-radius:0 10px 10px 0}
    .article-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.95rem}
    .article-body th,.article-body td{border:1px solid #e5e7eb;padding:10px;text-align:left}
    .article-body th{background:rgba(212,175,55,.12);color:#111;font-weight:800}
    .article-cta{background:linear-gradient(135deg,var(--gold),var(--accent));color:#111;padding:24px;border-radius:16px;margin:32px 0;text-align:center}
    .article-cta h3{margin:0 0 8px;font-weight:800;color:#111}
    .article-cta a{display:inline-block;background:#111;color:#fff;padding:10px 22px;border-radius:99px;font-weight:800;text-decoration:none;margin-top:8px}
    .back-link{display:inline-block;color:var(--gold);font-weight:700;text-decoration:none;margin-bottom:16px}
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITULO}}",
    "description": "{{RESUMEN}}",
    "datePublished": "{{FECHA_ISO}}",
    "author": { "@type": "Organization", "name": "Altorra Inmobiliaria" },
    "publisher": {
      "@type": "Organization",
      "name": "Altorra Inmobiliaria",
      "logo": { "@type": "ImageObject", "url": "https://i.postimg.cc/SsPmBFXt/Chat-GPT-Image-9-ago-2025-10-31-20.png" }
    },
    "mainEntityOfPage": "https://altorrainmobiliaria.co/blog/{{SLUG}}.html"
  }
  </script>
</head>
<body>
  <div id="header-placeholder"></div>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <main id="main">
    <article>
      <section class="article-hero">
        <span class="tag">{{CATEGORIA}}</span>
        <h1>{{TITULO}}</h1>
        <div class="meta">{{FECHA_VISIBLE}} · {{TIEMPO}} min lectura</div>
      </section>
      <div class="article-body">
        <a class="back-link" href="../blog.html">← Volver al blog</a>

        <!-- ==========================================
             CONTENIDO DEL ARTÍCULO — Reemplazar abajo
             ========================================== -->
        {{CONTENIDO}}

        <div class="article-cta">
          <h3>¿Quieres asesoría personalizada?</h3>
          <p style="color:#1f2937;margin:0">Hablemos de tu caso específico. Respuesta en menos de 24h.</p>
          <a href="../contacto.html">Agendar asesoría →</a>
        </div>

        <a class="back-link" href="../blog.html">← Volver al blog</a>
      </div>
    </article>
  </main>
  <div id="footer-placeholder"></div>
  <link rel="stylesheet" href="../css/whatsapp-float.css"/>
  <a href="https://wa.me/573002439810" class="whatsapp-float" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg viewBox="0 0 32 32" fill="#fff"><path d="M16.004 0h-.008C7.174 0 0 7.176 0 16.004c0 3.5 1.129 6.742 3.047 9.379L1.054 31.26l6.15-1.965A15.9 15.9 0 0016.004 32C24.826 32 32 24.826 32 16.004 32 7.176 24.826 0 16.004 0z"/></svg>
  </a>
  <script src="../js/components.js" defer></script>
  <script src="../js/i18n.js"></script>
  <script defer src="../js/whatsapp-tracker.js"></script>
  <script defer src="../js/newsletter.js"></script>
</body>
</html>
