  <style>
    main {
      padding-top: calc(var(--header-h) + 20px);
      max-width: var(--page-max);
      margin: 0 auto 60px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800;
      color: var(--gold);
      margin: 0 0 10px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .empty-state p {
      color: var(--muted);
      margin-bottom: 30px;
    }

    .empty-state .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, var(--accent), #ffd95e);
      color: #111;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      transition: transform .15s ease;
    }

    .empty-state .btn:hover {
      transform: translateY(-2px);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(3, 1fr);
    }

    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    .fav-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      transition: transform .18s ease, box-shadow .18s ease;
      cursor: pointer;
      position: relative;
    }

    .fav-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,.12);
    }

    .fav-card .media {
      position: relative;
      width: 100%;
      height: 200px;
      background: #f5f5f5;
    }

    .fav-card .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fav-card .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.95);
      color: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: transform .15s ease;
      z-index: 2;
    }

    .fav-card .remove-btn:hover {
      transform: scale(1.1);
      background: rgba(220, 38, 38, 1);
    }

    .fav-card .meta {
      padding: 14px;
    }

    .fav-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fav-card .price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .fav-card .specs {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .fav-card .location {
      display:flex;align-items:center;gap:4px;
      color:var(--muted);font-size:.82rem;margin-bottom:6px;
    }
    .fav-card .location svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0}

    .fav-card .op-badge {
      position:absolute;top:10px;left:10px;
      padding:3px 10px;border-radius:20px;
      font-size:.72rem;font-weight:700;text-transform:uppercase;
      z-index:2;letter-spacing:.3px;
    }
    .op-badge.comprar{background:rgba(16,185,129,.9);color:#fff}
    .op-badge.arrendar{background:rgba(59,130,246,.9);color:#fff}
    .op-badge.dias{background:rgba(245,158,11,.9);color:#fff}

    .fav-card .card-actions {
      display:flex;gap:8px;margin-top:10px;
    }
    .fav-card .btn-wa {
      flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
      padding:8px 0;border-radius:8px;
      background:#25d366;color:#fff;font-size:.82rem;font-weight:700;
      text-decoration:none;transition:background .15s;
    }
    .fav-card .btn-wa:hover{background:#1da851}
    .fav-card .btn-wa svg{width:16px;height:16px;fill:#fff}
    .fav-card .btn-detail {
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:8px 0;border-radius:8px;
      background:linear-gradient(90deg,var(--gold),var(--accent));
      color:#000;font-size:.82rem;font-weight:700;
      text-decoration:none;transition:transform .12s;
    }
    .fav-card .btn-detail:hover{transform:translateY(-1px)}

    .sort-select {
      padding:6px 12px;border:1px solid rgba(0,0,0,.12);border-radius:8px;
      font-family:Poppins,sans-serif;font-size:.85rem;font-weight:600;
      color:var(--text);background:#fff;cursor:pointer;
    }

    .btn-share-list {
      padding:8px 16px;background:transparent;
      border:1.5px solid var(--gold);border-radius:8px;
      font-weight:700;cursor:pointer;color:var(--gold);
      font-family:Poppins,sans-serif;font-size:.85rem;
      transition:background .15s,color .15s;display:flex;align-items:center;gap:6px;
    }
    .btn-share-list:hover{background:var(--gold);color:#000}

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions-bar .count {
      font-weight: 700;
      color: var(--muted);
    }

    .actions-bar .btn-clear {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      transition: background .15s ease;
    }

    .actions-bar .btn-clear:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }
  </style>

<style>
  /* MOBILE-FIRST: en móvil se apilan (columna) y ocupan ancho completo del contenedor */
  .empty-state .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;              /* espacio entre botones */
    align-items: stretch;   /* que cada botón ocupe el ancho disponible */
  }
  .empty-state .btn {
    display: inline-flex;   /* respeta márgenes y centra contenido */
    justify-content: center;
    align-items: center;
    width: 100%;            /* en móvil, botón a lo ancho */
    text-align: center;
  }

  /* DESKTOP/TABLET: desde 768px, en fila con espacio y ancho mínimo */

    .empty-state .btn-group {

    }
    .empty-state .btn {
      width: auto;          /* que ya no ocupen 100% */
      min-width: 220px;     /* opcional: tamaño visual consistente */
    }
  }
</style>

  <script>
    var _u = window.AltorraUtils || {};
    function formatCOP(n) { return _u.formatCOP ? _u.formatCOP(n) : (!n && n !== 0 ? '' : n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.')); }

    function capitalize(str) {
      return _u.capitalize ? _u.capitalize(str) : (!str ? '' : str.charAt(0).toUpperCase() + str.slice(1));
    }

    function renderFavorites() {
      // Usar AltorraFavoritos si está disponible (sync con Firebase), si no, leer localStorage
      let favs = [];
      if (window.AltorraFavoritos) {
        favs = window.AltorraFavoritos.get();
      } else {
        try {
          const raw = localStorage.getItem('altorra:favoritos');
          if (raw) { favs = JSON.parse(raw); if (!Array.isArray(favs)) favs = []; }
        } catch { favs = []; }
      }

      const grid = document.getElementById('favorites-grid');
      const emptyState = document.getElementById('empty-state');
      const actionsBar = document.getElementById('actions-bar');
      const countEl = document.getElementById('fav-count');

      if (favs.length === 0) {
        grid.style.display = 'none';
        actionsBar.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      actionsBar.style.display = 'flex';
      grid.style.display = 'grid';
      countEl.textContent = `${favs.length} ${favs.length === 1 ? 'propiedad guardada' : 'propiedades guardadas'}`;

      grid.innerHTML = '';

      var sortVal = document.getElementById('sort-favs').value;
      if (sortVal === 'price-asc') favs.sort(function(a,b){ return (a.price||0) - (b.price||0); });
      else if (sortVal === 'price-desc') favs.sort(function(a,b){ return (b.price||0) - (a.price||0); });
      else if (sortVal === 'name') favs.sort(function(a,b){ return (a.title||'').localeCompare(b.title||''); });

      favs.forEach(prop => {
        const card = document.createElement('article');
        card.className = 'fav-card';

        let priceLabel = '';
        const op = (prop.operation || '').toLowerCase();
        if (prop.price) {
          const priceStr = formatCOP(prop.price);
          if (op === 'arrendar') {
            priceLabel = `$${priceStr} COP / mes`;
          } else if (op === 'dias') {
            priceLabel = `$${priceStr} COP / noche`;
          } else {
            priceLabel = `$${priceStr} COP`;
          }
        }

        var opLabel = op === 'arrendar' ? 'Arriendo' : op === 'dias' ? 'Por días' : 'Venta';
        var opClass = op === 'arrendar' ? 'arrendar' : op === 'dias' ? 'dias' : 'comprar';

        var locParts = [];
        if (prop.neighborhood || prop.barrio) locParts.push(prop.neighborhood || prop.barrio);
        if (prop.city) locParts.push(prop.city);
        var locStr = locParts.join(', ');

        const specs = [];
        if (prop.type) specs.push(capitalize(prop.type));
        if (prop.beds) specs.push(`${prop.beds}H`);
        if (prop.baths) specs.push(`${prop.baths}B`);
        if (prop.sqm) specs.push(`${prop.sqm}m²`);
        if (prop.garages) specs.push(`${prop.garages}P`);

        var waMsg = encodeURIComponent('Hola Altorra, me interesa la propiedad: ' + (prop.title || prop.id));
        var waLink = 'https://wa.me/573002439810?text=' + waMsg;
        var detailLink = 'detalle-propiedad.html?id=' + encodeURIComponent(prop.id);

        var esc = function(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; };

        card.innerHTML = `
          <div class="media">
            <img src="${prop.image || 'https://i.postimg.cc/0yYb8Y6r/placeholder.png'}" alt="${esc(prop.title || 'Propiedad')}" loading="lazy" />
            <span class="op-badge ${opClass}">${opLabel}</span>
            <button class="remove-btn" data-id="${esc(prop.id)}" aria-label="Eliminar de favoritos">&times;</button>
          </div>
          <div class="meta">
            <h3>${esc(prop.title || 'Propiedad')}</h3>
            ${locStr ? `<div class="location"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>${esc(locStr)}</div>` : ''}
            ${priceLabel ? `<div class="price">${priceLabel}</div>` : ''}
            ${specs.length ? `<div class="specs">${specs.join(' &middot; ')}</div>` : ''}
            <div class="card-actions">
              <a class="btn-wa" href="${waLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
                WhatsApp
              </a>
              <a class="btn-detail" href="${detailLink}" onclick="event.stopPropagation()">Ver detalle</a>
            </div>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.remove-btn') || e.target.closest('.btn-wa') || e.target.closest('.btn-detail')) return;
          window.location.href = detailLink;
        });

        const removeBtn = card.querySelector('.remove-btn');
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('¿Eliminar de favoritos?')) {
            if (window.AltorraFavoritos) {
              window.AltorraFavoritos.remove(prop.id).then(() => renderFavorites());
            } else {
              try {
                let f = JSON.parse(localStorage.getItem('altorra:favoritos') || '[]');
                f = f.filter(x => x.id !== prop.id);
                localStorage.setItem('altorra:favoritos', JSON.stringify(f));
                document.dispatchEvent(new CustomEvent('altorra:fav-update', { detail: { count: f.length } }));
                renderFavorites();
              } catch { /* ignore */ }
            }
          }
        });

        grid.appendChild(card);
      });
    }

    // Ordenar favoritos
    document.getElementById('sort-favs').addEventListener('change', renderFavorites);

    // Compartir lista de favoritos
    document.getElementById('btn-share-list').addEventListener('click', function() {
      var favs = [];
      if (window.AltorraFavoritos) { favs = window.AltorraFavoritos.get(); }
      else { try { favs = JSON.parse(localStorage.getItem('altorra:favoritos') || '[]'); } catch(e){} }
      if (!favs.length) return;
      var lines = favs.map(function(p){ return (p.title || p.id) + ' — ' + 'https://altorrainmobiliaria.co/detalle-propiedad.html?id=' + encodeURIComponent(p.id); });
      var text = 'Mis favoritos en Altorra Inmobiliaria:\n\n' + lines.join('\n');
      if (navigator.share) {
        navigator.share({ title: 'Mis Favoritos — Altorra Inmobiliaria', text: text }).catch(function(){});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function(){
          if (window.AltorraUtils && window.AltorraUtils.showToast) window.AltorraUtils.showToast('Lista copiada al portapapeles');
          else alert('Lista copiada al portapapeles');
        });
      } else {
        prompt('Copia esta lista:', text);
      }
    });

    // Limpiar todos los favoritos
    document.getElementById('btn-clear-all').addEventListener('click', () => {
      if (confirm('¿Estás seguro de eliminar todos los favoritos?')) {
        if (window.AltorraFavoritos) {
          window.AltorraFavoritos.clear();
          renderFavorites();
        } else {
          try {
            localStorage.removeItem('altorra:favoritos');
            document.dispatchEvent(new CustomEvent('altorra:fav-update', { detail: { count: 0 } }));
            renderFavorites();
          } catch { /* ignore */ }
        }
      }
    });

    // Render inicial cuando el DOM esté listo
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderFavorites);
    } else {
      renderFavorites();
    }

    // Re-renderizar si se actualiza desde otra pestaña o desde Firebase
    window.addEventListener('storage', (e) => {
      if (e.key === 'altorra:favoritos') renderFavorites();
    });
    // Re-renderizar al sincronizar con Firebase (favorites-manager dispara este evento)
    document.addEventListener('altorra:fav-update', renderFavorites);
  </script>
