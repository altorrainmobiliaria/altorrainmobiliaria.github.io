<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altorra | Inmobiliaria</title>

<!-- Fuentes y librerías -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary-color: #B8860B;
    --secondary-color: #000000;
    --text-color-light: #F8F8F8;
    --background-color: #f0f0f0;
    --title-font-family: 'Playfair Display', serif;
    --font-family: 'Inter', sans-serif;
}

/* Reset y estilo base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    width: 100%;
    min-height: 100%;
    font-family: var(--font-family);
    color: var(--secondary-color);
    background-color: var(--background-color);
}

/* Sección principal */
.welcome-section {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;

    /* Fondo */
    background-image: url('https://i.ibb.co/93YTZc9t/Gemini-Generated-Image-slxfewslxfewslxf.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: contrast(1.05) saturate(1.1);
    position: relative;
}

/* Capa oscura sutil para mejorar contraste */
.welcome-section::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.35); /* más contraste */
    z-index: 0;
}

/* Logo */
.logo {
    max-width: 220px;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.15));
    z-index: 1;
}

/* Lista de servicios */
.services-list {
    list-style: none;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
    z-index: 1;
}
.services-list li {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-style: italic;
    color: var(--text-color-light);
    position: relative;
}
.services-list li::before {
    content: "•";
    color: var(--primary-color);
    margin-right: 8px;
}

/* Botón */
.scroll-down-btn {
    margin-top: 30px;
    background-color: var(--primary-color);
    color: var(--text-color-light);
    padding: 12px 28px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 15px rgba(184,134,11,0.6);
    animation: bounce 1.5s infinite;
    z-index: 1;
}
.scroll-down-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 0 22px rgba(184,134,11,0.9);
}
@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
    60% { transform: translateY(-3px); }
}

/* Ajustes responsivos */
@media (max-width: 768px) {
    .logo {
        max-width: 180px;
    }
    .services-list {
        gap: 10px;
    }
}
@media (max-width: 480px) {
    .services-list li {
        font-size: 0.95rem;
        padding: 0 10px;
    }
    .scroll-down-btn {
        font-size: 0.9rem;
        padding: 10px 24px;
    }
}
</style>
</head>
<body>

<main class="welcome-section" id="welcome">
    <img src="https://i.ibb.co/9kvg1wzh/Chat-GPT-Image-9-ago-2025-10-31-20-p-m.png" alt="Altorra Inmobiliaria Logo" class="logo">
    <ul class="services-list">
        <li>Expertos en administración de inmuebles</li>
        <li>Compra, venta y arriendo con respaldo legal</li>
        <li>Protege y potencia tu patrimonio</li>
        <li>Seguridad • Legalidad • Confianza</li>
        <li>Cartagena, Colombia</li>
    </ul>
    <a href="#propiedades" class="scroll-down-btn" id="startBtn">Explorar Propiedades <i class="fas fa-arrow-down"></i></a>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector('#propiedades');
        if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
        } else {
            alert('¡Listo para empezar a explorar! Publica tu sitio para que el botón funcione.');
        }
    });

    /* Ajuste altura automática del iframe (Google Sites) */
    function resizeIframe() {
        const bodyHeight = document.documentElement.scrollHeight;
        if (window.parent) {
            window.parent.postMessage({
                'type': 'setHeight',
                'height': bodyHeight
            }, '*');
        }
    }
    new ResizeObserver(resizeIframe).observe(document.body);
    resizeIframe();
});
</script>
</body>
</html>
