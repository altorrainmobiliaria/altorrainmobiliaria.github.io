<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altorra | Inmobiliaria</title>

<!-- Fuentes y librerías -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary-color: #B8860B;
    --secondary-color: #000000;
    --text-color-light: #F8F8F8;
    --background-color: #f0f0f0;
    --title-font-family: 'Playfair Display', serif;
    --font-family: 'Inter', sans-serif;
}

/* Reset y estilo base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    width: 100%;
    min-height: 100%;
    font-family: var(--font-family);
    color: var(--secondary-color);
    background-color: var(--background-color);
}

/* Sección principal */
.welcome-section {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(180deg, #fff 0%, var(--background-color) 100%);
}

/* Logo */
.logo {
    max-width: 220px;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.15));
}

/* Lista de servicios */
.services-list {
    list-style: none;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
}
.services-list li {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-style: italic;
    position: relative;
    padding-left: 0;
}

/* Botón */
.scroll-down-btn {
    margin-top: 30px;
    background-color: var(--primary-color);
    color: var(--text-color-light);
    padding: 12px 28px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    transition: all 0.25s ease;
    box-shadow: 0 0 15px rgba(184,134,11,0.6);
    animation: bounce 1.5s infinite;
}
.scroll-down-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 0 22px rgba(184,134,11,0.9);
}
@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
    60% { transform: translateY(-3px); }
}

/* Ajuste responsivo */
@media (max-width: 768px) {
    .logo {
        max-width: 180px;
    }
    .services-list {
        gap: 10px;
    }
}
</style>
</head>
<body>

<div class="welcome-section" id="welcome">
    <!-- Aquí pegas tu imagen de logo -->
    <img src="AQUI_URL_LOGO" alt="Altorra Inmobiliaria Logo" class="logo">
    
    <ul class="services-list">
        <li>Administración de inmuebles</li>
        <li>Compra, venta y arriendo</li>
        <li>Soluciones para tu patrimonio</li>
        <li>Seguridad • Legalidad • Confianza</li>
        <li>Cartagena, Colombia</li>
    </ul>

    <!-- Cambia la URL del botón por tu página de propiedades -->
    <a href="pagina-propiedades.html" class="scroll-down-btn">Explorar Propiedades <i class="fas fa-arrow-down"></i></a>
</div>

</body>
</html>
