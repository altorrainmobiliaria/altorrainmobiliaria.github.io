<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altorra Inmobiliaria</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://i.ibb.co/93YTZc9t/Gemini-Generated-Image-slxfewslxfewslxf.png') no-repeat center center fixed;
            background-size: cover;
            color: black;
        }

        header {
            background: rgba(255, 255, 255, 0.85);
            padding: 20px;
            text-align: center;
        }

        header img {
            max-width: 250px;
        }

        main {
            padding: 50px 20px;

        }

            display: inline-block;
            background: rgba(0, 0, 0, 0.45);

            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.4rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        footer {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

    <header>
        <img src="https://i.ibb.co/GYwWrrh/Chat-GPT-Image-9-ago-2025-10-19-28-p-m.png" alt="Logo Altorra Inmobiliaria">

    <main>
        <div class="highlight-text">
            Bienvenido a Altorra Inmobiliaria — Tu hogar, nuestra prioridad
