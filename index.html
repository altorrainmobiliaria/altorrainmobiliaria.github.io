<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altorra Inmobiliaria</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
        }

        .welcome-section {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: url('https://i.ibb.co/93YTZc9t/Gemini-Generated-Image-slxfewslxfewslxf.png') no-repeat center center;
            background-size: cover;
            color: white;
            text-align: center;
        }

        .welcome-section img {
            max-width: 300px;
            margin-bottom: 20px;
        }

        .welcome-section h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .welcome-section p {
            font-size: 1.2em;
            max-width: 600px;
        }

        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Altorra Inmobiliaria</h1>
    </header>

    <section class="welcome-section">
        <img src="https://i.ibb.co/GYwWrrh/Chat-GPT-Image-9-ago-2025-10-19-28-p-m.png" alt="Logo Altorra Inmobiliaria">
        <h2>Bienvenido a Altorra Inmobiliaria</h2>
        <p>Tu mejor aliado para encontrar la propiedad de tus sueños. Compra, vende o arrienda con nosotros.</p>
    </section>

    <footer>
        <p>&copy; 2025 Altorra Inmobiliaria - Todos los derechos reservados</p>
    </footer>

</body>
</html>
